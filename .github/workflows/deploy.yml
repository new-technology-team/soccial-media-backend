name: Deploy Backend

on:
  push:
    branches:
      - tongquockhanh2510

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/soccial-media-backend

            git fetch
            git reset --hard origin/tongquockhanh2510

            npm install
            npm run build

            pm2 restart social-backend