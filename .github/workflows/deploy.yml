name: Deploy Backend

on:
  push:
    branches:
      - tongquockhanh2510

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 60s
          command_timeout: 900s
          script: |
            cd ~/soccial-media-backend
            git fetch origin
            git reset --hard origin/tongquockhanh2510
            npm install
            pm2 restart social-backend
            pm2 save  